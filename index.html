<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWILL · Генератор сайтов</title>
    <script type="importmap">
        {
            "imports": {
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0/dist/transformers.min.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }
        /* ШАПКА */
        .header {
            background: #161b22;
            padding: 10px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .status {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* ОСНОВНОЙ БЛОК */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        @media (min-width: 700px) {
            .main { flex-direction: row; }
        }

        /* ЧАТ */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 92%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .message.user .avatar { background: #238636; color: #fff; }
        .message.assistant .avatar { background: #1f2937; color: #f0883e; border: 1px solid #30363d; }
        .message .bubble {
            background: #161b22;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #30363d;
            line-height: 1.5;
            word-break: break-word;
            font-size: 0.9rem;
        }
        .message.user .bubble { background: #238636; border-color: #238636; }
        .message .bubble pre {
            background: #0d1117;
            padding: 8px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 4px 0;
            font-size: 0.75rem;
        }
        .message .bubble code { font-family: monospace; background: #0d1117; padding: 2px 5px; border-radius: 4px; }

        /* ПОЛЕ ВВОДА */
        .input-area {
            padding: 10px 16px 14px;
            background: #0d1117;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 18px;
            padding: 8px 14px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            min-height: 40px;
            max-height: 120px;
        }
        .input-area textarea:focus { border-color: #58a6ff; }
        .input-area button {
            padding: 0 18px;
            border: none;
            border-radius: 18px;
            background: #238636;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        .input-area button:disabled { opacity: 0.4; }

        /* ПАНЕЛЬ ПРЕВЬЮ */
        .preview-panel {
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 40vh;
        }
        @media (min-width: 700px) {
            .preview-panel {
                width: 50%;
                height: 100%;
                border-top: none;
                border-left: 1px solid #30363d;
            }
        }
        .preview-panel .tabs {
            display: flex;
            border-bottom: 1px solid #30363d;
            background: #0d1117;
            flex-shrink: 0;
        }
        .preview-panel .tabs button {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #8b949e;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .preview-panel .tabs button.active {
            color: #e6edf3;
            border-bottom-color: #58a6ff;
        }
        .preview-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .preview-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        .preview-container .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8b949e;
            font-size: 0.9rem;
            flex-direction: column;
            gap: 8px;
        }
        .file-bar {
            padding: 8px 14px;
            background: #0d1117;
            border-top: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
            min-height: 44px;
        }
        .file-bar .file-tag {
            background: #21262d;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .file-bar .file-tag a { color: #58a6ff; text-decoration: none; }
        .file-bar .download-all {
            margin-left: auto;
            background: #238636;
            border: none;
            color: #fff;
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- ШАПКА -->
    <div class="header">
        <div class="logo">SWILL</div>
        <div style="opacity:0.4;">·</div>
        <div style="font-size:0.8rem; opacity:0.8;">Генератор сайтов</div>
        <div class="status">
            <span class="status-dot"></span>
            <span id="modelStatus">Загрузка...</span>
        </div>
    </div>

    <!-- ОСНОВНАЯ ОБЛАСТЬ -->
    <div class="main">
        <!-- ЧАТ -->
        <div class="chat">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        <strong>Привет! Я SWILL.</strong><br>
                        Напиши, какой сайт нужно создать.<br>
                        <em>Пример: «Сделай лендинг для кофейни»</em>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <textarea id="userInput" rows="1" placeholder="Опиши сайт..."></textarea>
                <button id="sendBtn">➤</button>
            </div>
        </div>

        <!-- ПАНЕЛЬ ПРЕВЬЮ -->
        <div class="preview-panel">
            <div class="tabs">
                <button class="active" data-tab="preview">👁️ Предпросмотр</button>
                <button data-tab="code">📄 Код</button>
            </div>
            <div class="preview-container" id="previewContainer">
                <div class="placeholder" id="placeholder">
                    <div style="font-size:2rem;">🌐</div>
                    <div>Здесь будет ваш сайт</div>
                </div>
                <iframe id="previewIframe" style="display:none; width:100%; height:100%; border:none;"></iframe>
                <pre id="codeView" style="display:none; padding:12px; margin:0; overflow:auto; height:100%; background:#0d1117; font-size:0.75rem; white-space:pre-wrap; word-wrap:break-word; color:#e6edf3;"></pre>
            </div>
            <div class="file-bar" id="fileBar">
                <span style="opacity:0.5; font-size:0.75rem;">📁 Файлы:</span>
                <span id="fileTags" style="opacity:0.4; font-size:0.75rem;">нет</span>
                <button class="download-all" id="downloadAllBtn" style="display:none;">⬇ ZIP</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // 1. ИМПОРТ НЕЙРОСЕТИ
        // ============================================================
        import { pipeline } from '@xenova/transformers';

        // ============================================================
        // 2. СОСТОЯНИЕ
        // ============================================================
        let generator = null;
        let isProcessing = false;
        let currentHtml = '';
        let currentFiles = [];

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelStatus = document.getElementById('modelStatus');

        const previewIframe = document.getElementById('previewIframe');
        const placeholder = document.getElementById('placeholder');
        const codeView = document.getElementById('codeView');
        const fileTags = document.getElementById('fileTags');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const tabButtons = document.querySelectorAll('.tabs button');

        // ============================================================
        // 3. ЗАГРУЗКА МОДЕЛИ (с обработкой ошибок)
        // ============================================================
        async function loadModel() {
            modelStatus.textContent = 'Загрузка GPT-2...';
            try {
                generator = await pipeline('text-generation', 'Xenova/gpt2');
                modelStatus.textContent = 'Готова ✅';
                addMessage('assistant', '✅ Нейросеть загружена! Можете создавать сайты.');
            } catch (e) {
                modelStatus.textContent = 'Ошибка ❌';
                console.error(e);
                addMessage('assistant', '⚠️ Не удалось загрузить нейросеть. Но вы всё равно можете использовать генератор на основе шаблонов (без ИИ).');
                // Включаем fallback-генератор
                generator = null;
            }
        }
        loadModel();

        // ============================================================
        // 4. ОТПРАВКА СООБЩЕНИЙ (работает всегда)
        // ============================================================
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            userInput.value = '';
            userInput.style.height = 'auto';

            addMessage('user', text);

            const thinkingMsg = addMessage('assistant', '⏳ Генерирую сайт...');

            try {
                let html = '';

                // Если нейросеть загружена — используем её
                if (generator) {
                    const prompt = `Создай полный HTML-документ с CSS (внутри <style>) и JS (внутри <script>) для: ${text}. Выдай только код от <!DOCTYPE html> до </html>.`;
                    const result = await generator(prompt, {
                        max_new_tokens: 800,
                        temperature: 0.7,
                        do_sample: true,
                    });
                    let raw = result[0].generated_text;
                    const start = raw.indexOf('<!DOCTYPE html>');
                    if (start !== -1) raw = raw.slice(start);
                    const end = raw.indexOf('</html>');
                    if (end !== -1) raw = raw.slice(0, end + 7);
                    html = raw || generateFallbackSite(text);
                } else {
                    // Fallback — генератор на основе ключевых слов
                    html = generateFallbackSite(text);
                }

                // Если всё равно пусто — подставляем заглушку
                if (!html || html.length < 50) {
                    html = `<!DOCTYPE html><html><head><title>Сайт</title></head><body><h1>🌐 Ваш сайт</h1><p>Описание: ${text}</p></body></html>`;
                }

                currentHtml = html;
                currentFiles = [{ name: 'index.html', content: html }];

                thinkingMsg.remove();
                addMessage('assistant', `✅ Сайт готов! Смотрите предпросмотр справа.`);

                showPreview(html);
                updateFileBar();

            } catch (e) {
                thinkingMsg.remove();
                addMessage('assistant', `❌ Ошибка: ${e.message}`);
                console.error(e);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // ============================================================
        // 5. FALLBACK-ГЕНЕРАТОР (без нейросети)
        // ============================================================
        function generateFallbackSite(description) {
            const lower = description.toLowerCase();
            let title = 'Сайт';
            let body = '<h1>Привет, SWILL!</h1><p>Сайт создан по описанию.</p>';

            if (lower.includes('кофейня') || lower.includes('кафе')) {
                title = 'Кофейня';
                body = `<h1>☕ Добро пожаловать в кофейню</h1><p>Лучший кофе в городе.</p><button>Заказать</button>`;
            } else if (lower.includes('портфолио')) {
                title = 'Портфолио';
                body = `<h1>Моё портфолио</h1><p>Проекты, работы, контакты.</p>`;
            } else if (lower.includes('лендинг')) {
                title = 'Лендинг';
                body = `<h1>🌐 Уникальное предложение</h1><p>Оставьте заявку</p><input placeholder="Email"><button>Отправить</button>`;
            } else if (lower.includes('блог')) {
                title = 'Блог';
                body = `<h1>📝 Мой блог</h1><article><h2>Статья 1</h2><p>Текст статьи...</p></article>`;
            }

            return `<!DOCTYPE html>
        <html lang="ru">
        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${title}</title>
        <style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0d1117;color:#e6edf3;flex-direction:column;padding:20px;text-align:center;}h1{font-size:2.5rem;}button,input{padding:10px 20px;border-radius:8px;border:none;margin:6px;}</style>
        </head>
        <body>${body}</body>
        </html>`;
        }

        // ============================================================
        // 6. ПРЕДПРОСМОТР
        // ============================================================
        function showPreview(html) {
            placeholder.style.display = 'none';
            previewIframe.style.display = 'block';
            codeView.style.display = 'none';
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            previewIframe.src = url;
            codeView.textContent = html;
            document.querySelector('.tabs button[data-tab="preview"]')?.classList.add('active');
        }

        // ============================================================
        // 7. ВКЛАДКИ
        // ============================================================
        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                tabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                if (tab === 'preview') {
                    previewIframe.style.display = currentHtml ? 'block' : 'none';
                    codeView.style.display = 'none';
                    placeholder.style.display = currentHtml ? 'none' : 'flex';
                } else {
                    previewIframe.style.display = 'none';
                    codeView.style.display = 'block';
                    placeholder.style.display = 'none';
                }
            });
        });

        // ============================================================
        // 8. ФАЙЛЫ
        // ============================================================
        function updateFileBar() {
            if (currentFiles.length === 0) {
                fileTags.textContent = 'нет';
                downloadAllBtn.style.display = 'none';
                return;
            }
            let html = '';
            currentFiles.forEach(f => {
                const blob = new Blob([f.content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                html += `<span class="file-tag">📄 ${f.name} <a href="${url}" download="${f.name}">⬇</a></span>`;
            });
            fileTags.innerHTML = html;
            downloadAllBtn.style.display = 'inline-block';
        }

        downloadAllBtn.addEventListener('click', async () => {
            if (currentFiles.length === 0) return;
            try {
                const JSZip = (await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js')).default;
                const zip = new JSZip();
                currentFiles.forEach(f => zip.file(f.name, f.content));
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'swill_site.zip';
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (e) {
                alert('Ошибка ZIP: ' + e.message);
            }
        });

        // ============================================================
        // 9. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            let html = content;
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
            html = html.replace(/`([^`]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`);
            html = html.replace(/\n/g, '<br>');
            bubble.innerHTML = html;
            div.appendChild(avatar);
            div.appendChild(bubble);
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // 10. ОБРАБОТЧИКИ
        // ============================================================
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        });
        userInput.focus();
    </script>
</body>
</html>
