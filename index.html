<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL · ИИ-помощник</title>
    <script type="importmap">
        {
            "imports": {
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0/dist/transformers.min.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== ШАПКА ===== */
        .header {
            background: #161b22;
            padding: 16px 28px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #58a6ff, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .status {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3fb950;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* ===== ОСНОВНАЯ ОБЛАСТЬ ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== ЧАТ ===== */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            min-width: 0;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .message {
            display: flex;
            gap: 14px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .message.user .avatar { background: #238636; color: #fff; }
        .message.assistant .avatar { background: #1f2937; color: #f0883e; border: 1px solid #30363d; }
        .message .bubble {
            background: #161b22;
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid #30363d;
            line-height: 1.6;
            word-break: break-word;
            overflow-x: auto;
        }
        .message.user .bubble { background: #238636; border-color: #238636; }
        .message .bubble pre {
            background: #0d1117;
            padding: 12px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid #30363d;
            font-size: 0.85rem;
        }
        .message .bubble code { font-family: 'Courier New', monospace; background: #0d1117; padding: 2px 6px; border-radius: 4px; }
        .message .bubble a { color: #58a6ff; text-decoration: none; }
        .message .bubble a:hover { text-decoration: underline; }

        /* ===== ВВОД ===== */
        .input-area {
            padding: 16px 28px 20px;
            background: #0d1117;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 24px;
            padding: 12px 18px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: 0.2s;
            min-height: 52px;
            max-height: 200px;
        }
        .input-area textarea:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15); }
        .input-area button {
            padding: 0 28px;
            border: none;
            border-radius: 24px;
            background: #238636;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-area button:hover { background: #2ea043; transform: scale(1.02); }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ===== ПАНЕЛЬ ИНСТРУМЕНТОВ (справа) ===== */
        .tools {
            width: 320px;
            background: #161b22;
            border-left: 1px solid #30363d;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .tools h3 {
            font-size: 0.9rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .tools .tool-btn {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 16px;
            color: #e6edf3;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .tools .tool-btn:hover { background: #2d333b; border-color: #58a6ff; }
        .tools .tool-btn .icon { margin-right: 10px; }
        .tools .file-list {
            background: #0d1117;
            border-radius: 12px;
            padding: 10px 14px;
            border: 1px solid #30363d;
            max-height: 160px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .tools .file-list .file-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #21262d;
        }
        .tools .file-list .file-item:last-child { border-bottom: none; }
        .tools .file-list .file-item a {
            color: #58a6ff;
            text-decoration: none;
            cursor: pointer;
        }
        .tools .file-list .file-item a:hover { text-decoration: underline; }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 820px) {
            .tools { display: none; }
            .message { max-width: 95%; }
            .header .status span { display: none; }
        }
    </style>
</head>
<body>

    <!-- ШАПКА -->
    <div class="header">
        <div class="logo">SWILL</div>
        <div style="opacity:0.5; font-size:0.9rem;">·</div>
        <div style="font-size:0.9rem; opacity:0.8;">ИИ-помощник</div>
        <div class="status">
            <span class="status-dot"></span>
            <span id="modelStatus">Загрузка...</span>
        </div>
    </div>

    <!-- ОСНОВНАЯ ОБЛАСТЬ -->
    <div class="main">
        <!-- ЧАТ -->
        <div class="chat">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        Привет! Я <strong>SWILL</strong> — нейросеть-помощник.<br>
                        Могу:<br>
                        • 📝 отвечать на вопросы<br>
                        • 💻 генерировать код (HTML, Python, JS)<br>
                        • 📁 создавать и скачивать файлы<br>
                        • 🔍 искать информацию<br><br>
                        <em>Просто напиши, что нужно сделать.</em>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="userInput" rows="1" placeholder="Спроси или дай команду..."></textarea>
                <button id="sendBtn">➤</button>
            </div>
        </div>

        <!-- ПАНЕЛЬ ИНСТРУМЕНТОВ -->
        <div class="tools">
            <h3>⚡ Быстрые действия</h3>
            <button class="tool-btn" data-cmd="Создай HTML-страницу с заголовком 'Мой сайт' и кнопкой.">
                <span class="icon">📄</span> Создать HTML
            </button>
            <button class="tool-btn" data-cmd="Напиши Python-скрипт, который выводит 'Hello, SWILL!'">
                <span class="icon">🐍</span> Python скрипт
            </button>
            <button class="tool-btn" data-cmd="Сгенерируй CSS для тёмной темы с градиентом.">
                <span class="icon">🎨</span> CSS стили
            </button>
            <button class="tool-btn" data-cmd="Создай React-компонент кнопки с счётчиком.">
                <span class="icon">⚛️</span> React компонент
            </button>

            <h3 style="margin-top:8px;">📁 Созданные файлы</h3>
            <div class="file-list" id="fileList">
                <div style="opacity:0.4; font-size:0.8rem;">Нет файлов</div>
            </div>
            <button id="downloadAllBtn" class="tool-btn" style="background:#238636; border-color:#238636; text-align:center;">
                ⬇ Скачать все файлы (ZIP)
            </button>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // 1. ИМПОРТЫ
        // ============================================================
        import { pipeline } from '@xenova/transformers';

        // ============================================================
        // 2. СОСТОЯНИЕ
        // ============================================================
        let generator = null;
        let isProcessing = false;
        const generatedFiles = []; // { name, content }

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelStatus = document.getElementById('modelStatus');
        const fileListDiv = document.getElementById('fileList');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        // ============================================================
        // 3. ЗАГРУЗКА МОДЕЛИ (GPT-2)
        // ============================================================
        async function loadModel() {
            modelStatus.textContent = 'Загрузка GPT-2...';
            try {
                generator = await pipeline('text-generation', 'Xenova/gpt2');
                modelStatus.textContent = 'Готова ✅';
            } catch (e) {
                modelStatus.textContent = 'Ошибка ❌';
                console.error(e);
                addMessage('assistant', '⚠️ Не удалось загрузить нейросеть. Проверь интернет.');
            }
        }
        loadModel();

        // ============================================================
        // 4. ОТПРАВКА СООБЩЕНИЙ
        // ============================================================
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing || !generator) return;

            isProcessing = true;
            sendBtn.disabled = true;
            userInput.value = '';
            userInput.style.height = 'auto';

            addMessage('user', text);

            const thinkingMsg = addMessage('assistant', '⏳ Думаю...');

            try {
                // Генерируем ответ
                const prompt = `Ты — полезный ИИ-ассистент SWILL. Отвечай кратко, по делу, с кодом если нужно. 
    Запрос: ${text}`;

                const result = await generator(prompt, {
                    max_new_tokens: 500,
                    temperature: 0.7,
                    do_sample: true,
                });

                let reply = result[0].generated_text;
                // Убираем повтор запроса из ответа
                if (reply.includes(text)) {
                    reply = reply.split(text)[1] || reply;
                }
                reply = reply.trim() || 'Я не смог сгенерировать ответ. Попробуй переформулировать.';

                // Удаляем "думаю" и вставляем ответ
                thinkingMsg.remove();
                addMessage('assistant', reply);

                // Пытаемся извлечь файлы из ответа
                extractFiles(reply);

            } catch (e) {
                thinkingMsg.remove();
                addMessage('assistant', `❌ Ошибка: ${e.message}`);
                console.error(e);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // ============================================================
        // 5. ДОБАВЛЕНИЕ СООБЩЕНИЙ В ЧАТ
        // ============================================================
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            // Простой маркдаун: код-блоки
            let html = content;
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });
            html = html.replace(/`([^`]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`);
            html = html.replace(/\n/g, '<br>');
            bubble.innerHTML = html;

            div.appendChild(avatar);
            div.appendChild(bubble);
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // 6. ИЗВЛЕЧЕНИЕ ФАЙЛОВ ИЗ ОТВЕТА
        // ============================================================
        function extractFiles(text) {
            // Ищем HTML
            const htmlMatch = text.match(/<!DOCTYPE html>[\s\S]*?<\/html>/i);
            if (htmlMatch) {
                addFile('index.html', htmlMatch[0]);
            }

            // Ищем CSS блок
            const cssMatch = text.match(/<style>([\s\S]*?)<\/style>/i);
            if (cssMatch && !htmlMatch) {
                addFile('style.css', cssMatch[1]);
            }

            // Ищем JS блок
            const jsMatch = text.match(/<script>([\s\S]*?)<\/script>/i);
            if (jsMatch && !htmlMatch) {
                addFile('script.js', jsMatch[1]);
            }

            // Ищем Python
            const pyMatch = text.match(/(def\s+\w+|import\s+\w+)[\s\S]{30,}/);
            if (pyMatch && !htmlMatch) {
                addFile('script.py', pyMatch[0]);
            }

            // Если ничего нет, но есть код в ``` - сохраняем как code.txt
            const codeBlockMatch = text.match(/```(\w+)?\n([\s\S]*?)```/);
            if (codeBlockMatch && generatedFiles.length === 0) {
                const lang = codeBlockMatch[1] || 'txt';
                const ext = lang === 'python' ? 'py' : lang === 'javascript' ? 'js' : lang;
                addFile(`code.${ext}`, codeBlockMatch[2].trim());
            }

            updateFileList();
        }

        function addFile(name, content) {
            // Проверяем, нет ли уже такого файла
            const exist = generatedFiles.find(f => f.name === name);
            if (exist) {
                exist.content = content;
            } else {
                generatedFiles.push({ name, content });
            }
            updateFileList();
        }

        // ============================================================
        // 7. ОБНОВЛЕНИЕ СПИСКА ФАЙЛОВ
        // ============================================================
        function updateFileList() {
            if (generatedFiles.length === 0) {
                fileListDiv.innerHTML = '<div style="opacity:0.4; font-size:0.8rem;">Нет файлов</div>';
                return;
            }

            let html = '';
            generatedFiles.forEach((f, i) => {
                const blob = new Blob([f.content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                html += `
                    <div class="file-item">
                        <span>📄 ${f.name}</span>
                        <a href="${url}" download="${f.name}">⬇</a>
                    </div>
                `;
            });
            fileListDiv.innerHTML = html;
        }

        // ============================================================
        // 8. СКАЧИВАНИЕ ВСЕХ ФАЙЛОВ (ZIP)
        // ============================================================
        downloadAllBtn.addEventListener('click', async () => {
            if (generatedFiles.length === 0) {
                alert('Нет файлов для скачивания.');
                return;
            }

            try {
                const JSZip = (await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js')).default;
                const zip = new JSZip();
                generatedFiles.forEach(f => zip.file(f.name, f.content));
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'swill_files.zip';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('Ошибка создания ZIP: ' + e.message);
            }
        });

        // ============================================================
        // 9. ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================
        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Авто-высота textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
        });

        // Быстрые кнопки
        document.querySelectorAll('.tool-btn[data-cmd]').forEach(btn => {
            btn.addEventListener('click', () => {
                userInput.value = btn.dataset.cmd;
                sendMessage();
            });
        });

        // ============================================================
        // 10. АВТО-ПРИВЕТСТВИЕ
        // ============================================================
        // Уже есть приветствие в HTML

        // Фокус на ввод
        userInput.focus();
    </script>
</body>
</html>
