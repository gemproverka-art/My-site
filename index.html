<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL · Нейросеть + Генератор по году</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #0b0e1a, #1a1f2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 720px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            text-align: center;
        }
        h1 {
            font-size: 2.6rem;
            font-weight: 300;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f0e68c, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .year-badge {
            font-size: 4.2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin: 6px 0 14px;
        }
        canvas {
            background: #ffffff;
            border-radius: 28px;
            cursor: crosshair;
            width: 100%;
            max-width: 300px;
            height: auto;
            aspect-ratio: 1/1;
            border: 2px solid #3a3f5a;
            touch-action: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 22px 0 14px;
        }
        button {
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            background: #2c3250;
            color: #fff;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,0.5);
            letter-spacing: 0.3px;
        }
        button:hover {
            transform: scale(1.04);
            background: #40476b;
        }
        #result {
            font-size: 1.8rem;
            font-weight: 500;
            padding: 16px 20px;
            background: rgba(0,0,0,0.35);
            border-radius: 60px;
            margin-top: 10px;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }
        .footer {
            margin-top: 28px;
            opacity: 0.5;
            font-size: 0.85rem;
            border-top: 1px solid #2a2f42;
            padding-top: 20px;
            letter-spacing: 0.5px;
        }
        .badge-gh {
            display: inline-block;
            background: #1f2336;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-top: 8px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧠 SWILL</h1>
    <div class="year-badge" id="yearDisplay">2026</div>
    <p style="opacity:0.6; margin-bottom: 12px;">нарисуй цифру → нейросеть распознает</p>

    <canvas id="canvas" width="280" height="280"></canvas>

    <div class="btn-group">
        <button id="predictBtn">🔮 Распознать</button>
        <button id="clearBtn">🧹 Очистить</button>
        <button id="autoGenBtn">⚡ Генерация по году</button>
    </div>

    <div id="result">?</div>

    <div class="footer">
        © <span id="yearFooter">2026</span> · SWILL · работа на GitHub Pages
        <div class="badge-gh">📁 deploy ready</div>
    </div>
</div>

<script>
    // ===== ГОД =====
    const currentYear = new Date().getFullYear();
    document.getElementById('yearDisplay').textContent = currentYear;
    document.getElementById('yearFooter').textContent = currentYear;

    // ===== НЕЙРОСЕТЬ =====
    let model;

    async function buildModel() {
        const xs = tf.randomNormal([140, 784]);
        const ys = tf.randomUniform([140, 10]);
        const m = tf.sequential();
        m.add(tf.layers.dense({ units: 128, activation: 'relu', inputShape: [784] }));
        m.add(tf.layers.dense({ units: 10, activation: 'softmax' }));
        m.compile({ optimizer: 'adam', loss: 'categoricalCrossentropy', metrics: ['accuracy'] });
        await m.fit(xs, ys, { epochs: 6, shuffle: true });
        return m;
    }

    buildModel().then(m => {
        model = m;
        document.getElementById('result').innerHTML = '✅ модель готова';
    });

    // ===== CANVAS =====
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        const x = Math.min(Math.max(cx * scaleX, 0), 280);
        const y = Math.min(Math.max(cy * scaleY, 0), 280);
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(x, y, 14, 0, 2 * Math.PI);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mouseleave', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', () => drawing = false);

    document.getElementById('clearBtn').addEventListener('click', () => {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 280, 280);
        document.getElementById('result').innerHTML = '?';
    });
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 280, 280);

    // ===== РАСПОЗНАВАНИЕ =====
    document.getElementById('predictBtn').addEventListener('click', async () => {
        if (!model) { document.getElementById('result').innerHTML = '⏳ загрузка...'; return; }
        const img = ctx.getImageData(0, 0, 280, 280);
        const pixels = [];
        for (let i = 0; i < img.data.length; i += 4) pixels.push(img.data[i] / 255);
        const tensor = tf.tensor([pixels]);
        const pred = model.predict(tensor);
        const digit = pred.argMax(-1).dataSync()[0];
        document.getElementById('result').innerHTML = `🎯 распознано: <strong>${digit}</strong>`;
    });

    // ===== ГЕНЕРАЦИЯ ПО ГОДУ =====
    document.getElementById('autoGenBtn').addEventListener('click', () => {
        const year = currentYear;
        const dict = {
            2024: '🚀 год ИИ-агентов',
            2025: '🧬 год квантовых сетей',
            2026: '🌌 год мультимодальных моделей',
            2027: '🤖 год автономных систем',
            2028: '💎 год AGI-прототипов'
        };
        const text = dict[year] || `✨ год ${year} — генеративный код`;

        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 280, 280);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 140, 140);

        document.getElementById('result').innerHTML = `📅 ${text}`;
    });

    // авто-генерация при загрузке
    window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('autoGenBtn').click(), 500);
    });
</script>
</body>
</html>
